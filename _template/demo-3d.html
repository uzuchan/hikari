<!DOCTYPE html>
<!--
  hikari demo template — Three.js (3D・AR空間グループ向け)
  使い方: demos/NN-slug.html にコピーし {{...}} を置換。
  そのまま開くと、星空に浮かぶ発光する歪んだ球体がゆっくり回る。ここから世界を育てる。
  three は unpkg から固定バージョン(0.149.0)で読む。バージョンは揃える。
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NN}} {{TITLE}}</title>
<link rel="stylesheet" href="../shared.css">
<style>
  #scene { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
</style>
</head>
<body data-screen-label="{{NN}} {{TITLE}}">

<canvas id="scene"></canvas>

<div class="hud-top">
  <div class="hud-title-block">
    <a class="hud-back" href="../index.html">← もどる</a>
    <div class="hud-no">PROTOTYPE {{NN}}</div>
    <div class="hud-title">{{TITLE}}</div>
  </div>
</div>

<div class="hud-bottom">
  <div class="hud-hint">{{HINT}}</div>
  <div class="hud-tech">
    <div class="tech-row"><span class="tech-label">試作</span><span class="tech-tag">{{PROTO}}</span></div>
    <div class="tech-row"><span class="tech-label">本実装</span><span class="tech-tag primary">{{PROD}}</span></div>
  </div>
</div>

<script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
<script>
// ---- 土台: レンダラ / シーン / カメラ ----
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 200);
camera.position.set(0, 0.6, 7);

const world = new THREE.Group();
scene.add(world);

// ---- 発光する主役（歪ませた球） ----
const geo = new THREE.SphereGeometry(2.0, 64, 64);
const pos = geo.attributes.position;
for (let i = 0; i < pos.count; i++) {
  const v = new THREE.Vector3().fromBufferAttribute(pos, i);
  const n = 1 + 0.05 * Math.sin(v.x * 3) * Math.sin(v.y * 4) * Math.sin(v.z * 2.5);
  v.multiplyScalar(n);
  pos.setXYZ(i, v.x, v.y, v.z);
}
geo.computeVertexNormals();
const core = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
  color: 0x1c2b4a, roughness: 0.8, metalness: 0.1,
  emissive: 0x2a3f6e, emissiveIntensity: 0.7
}));
world.add(core);

// ---- 大気グロー（放射グラデのスプライト） ----
const glowTex = (() => {
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(128, 128, 50, 128, 128, 128);
  grad.addColorStop(0, 'rgba(140,200,255,0.35)');
  grad.addColorStop(1, 'rgba(140,200,255,0)');
  g.fillStyle = grad; g.fillRect(0, 0, 256, 256);
  return new THREE.CanvasTexture(c);
})();
const glow = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTex, transparent: true, depthWrite: false }));
glow.scale.setScalar(7);
scene.add(glow);

// ---- 星空 ----
const starGeo = new THREE.BufferGeometry();
const sp = [];
for (let i = 0; i < 800; i++) {
  const v = new THREE.Vector3().randomDirection().multiplyScalar(40 + Math.random() * 50);
  sp.push(v.x, v.y, v.z);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(sp, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xf4f2ec, size: 0.18, transparent: true, opacity: 0.8 })));

// ---- ライト ----
scene.add(new THREE.AmbientLight(0x8899cc, 0.5));
const sun = new THREE.DirectionalLight(0xfff2dd, 1.4);
sun.position.set(5, 3, 4);
scene.add(sun);

// ---- 入力: ドラッグで回転 ----
let dragging = false, px = 0;
canvas.addEventListener('pointerdown', e => { dragging = true; px = e.clientX; });
addEventListener('pointermove', e => {
  if (!dragging) return;
  world.rotation.y += (e.clientX - px) * 0.005;
  px = e.clientX;
});
addEventListener('pointerup', () => dragging = false);

// ---- リサイズ ----
function fit() {
  renderer.setSize(innerWidth, innerHeight, false);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
}
fit();
addEventListener('resize', fit);

// ---- ループ ----
function loop() {
  if (!dragging) world.rotation.y += 0.002;
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
